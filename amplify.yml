version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Only install dependencies for the web app and root constants
        - npm install --workspace=@pathfindr/web --include-workspace-root --legacy-peer-deps
    build:
      commands:
        - npm run build:web
  artifacts:
    # Deployment is isolated to ONLY the build output of the web application.
    # Unnecessary folders like 'mobile' or 'scraper' are NOT included in the artifacts.
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.next/cache/**/*
